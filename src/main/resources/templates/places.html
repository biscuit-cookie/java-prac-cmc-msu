<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="general :: head('Места')"></head>
<body class="bg-light">
<div th:replace="general :: page-header"></div>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h2 mb-0">Список мест</h1>
        <a class="btn btn-success" id="addPlaceButton" th:href="@{/editPlace}">Добавить место</a>
    </div>

    <form class="row g-3 mb-4" th:action="@{/places}" method="get">
        <div class="col-md-10">
            <label class="form-label" for="placeSearch">Поиск места по названию</label>
            <input class="form-control" id="placeSearch" name="search" type="text" th:value="${search}">
        </div>
        <div class="col-md-2 d-grid">
            <button class="btn btn-primary align-self-end" id="searchPlaceButton" type="submit">Найти</button>
        </div>
    </form>

    <div class="list-group shadow-sm" id="placesList">
        <div class="list-group-item text-secondary" th:if="${#lists.isEmpty(places)}">Подходящие места не найдены.</div>
        <a class="list-group-item list-group-item-action"
           th:each="place : ${places}"
           th:href="@{/place(placeId=${place.id})}">
            <div class="fw-semibold" th:text="${place.name}">Название места</div>
            <div class="small text-secondary" th:text="${place.description}">Описание места</div>
        </a>
    </div>
</main>
<div th:replace="general :: page-footer"></div>
</body>
</html>
