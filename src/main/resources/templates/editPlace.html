<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="general :: head(${place.id} != null ? 'Редактировать место' : 'Добавить место')"></head>
<body class="bg-light">
<div th:replace="general :: page-header"></div>
<main class="container py-4">
    <div class="col-lg-8 mx-auto">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h2 mb-4" th:text="${place.id} != null ? 'Редактирование места' : 'Добавление места'">Форма места</h1>
                <form th:action="@{/savePlace}" method="post">
                    <input type="hidden" name="placeId" th:value="${place.id}">

                    <div class="mb-3">
                        <label class="form-label" for="placeName">Название</label>
                        <input class="form-control" id="placeName" name="name" type="text" th:value="${place.name}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="placeDescription">Описание</label>
                        <textarea class="form-control" id="placeDescription" name="description" rows="4"
                                  th:text="${place.description}" required></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" id="savePlaceButton" type="submit">Сохранить</button>
                        <a class="btn btn-outline-secondary" th:href="${place.id} != null ? @{/place(placeId=${place.id})} : @{/places}">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<div th:replace="general :: page-footer"></div>
</body>
</html>
