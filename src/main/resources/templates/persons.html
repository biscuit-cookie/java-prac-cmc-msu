<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="general :: head('Люди')"></head>
<body class="bg-light">
<div th:replace="general :: page-header"></div>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h2 mb-0">Список людей</h1>
        <a class="btn btn-success" id="addPersonFromListButton" th:href="@{/editPerson}">Добавить человека</a>
    </div>

    <form class="row g-3 mb-4" th:action="@{/persons}" method="get">
        <div class="col-md-6">
            <label class="form-label" for="search">Поиск по имени</label>
            <input class="form-control" id="search" name="search" type="text" th:value="${search}">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="sort">Сортировка</label>
            <select class="form-select" id="sort" name="sort">
                <option th:selected="${sort == 'name'}" value="name">По имени</option>
                <option th:selected="${sort == 'birthDate'}" value="birthDate">По году рождения</option>
            </select>
        </div>
        <div class="col-md-2 d-grid">
            <button class="btn btn-primary align-self-end" id="searchPersonButton" type="submit">Применить</button>
        </div>
    </form>

    <div class="table-responsive bg-white rounded-3 shadow-sm">
        <table class="table table-hover align-middle mb-0" id="personsTable">
            <thead class="table-light">
            <tr>
                <th>Имя</th>
                <th>Пол</th>
                <th>Годы жизни</th>
                <th>Родственные связи</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(people)}">
                <td colspan="4" class="text-center text-secondary py-4">Подходящие люди не найдены.</td>
            </tr>
            <tr th:each="person : ${people}">
                <td>
                    <a th:href="@{/person(personId=${person.id})}">
                        <span th:text="${person.name}">Имя человека</span>
                    </a>
                </td>
                <td th:text="${person.gender}">Пол</td>
                <td>
                    <span th:text="${person.dateOfBirth != null ? person.dateOfBirth : '?'}">?</span>
                    -
                    <span th:text="${person.dateOfDeath != null ? person.dateOfDeath : '...' }">...</span>
                </td>
                <td>
                    <span class="text-secondary"
                          th:text="${relationCounts[person.id]} + ' связ.'">0 связ.</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="general :: page-footer"></div>
</body>
</html>
