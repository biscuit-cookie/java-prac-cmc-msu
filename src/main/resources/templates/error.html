<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="general :: head('Ошибка')"></head>
<body class="bg-light">
<div th:replace="general :: page-header"></div>
<main class="container py-4">
    <div class="alert alert-danger shadow-sm" id="errorMessageBlock">
        <h1 class="h3">Ошибка обработки запроса</h1>
        <p class="mb-0" th:text="${errorMessage}">Произошла ошибка.</p>
    </div>
</main>
<div th:replace="general :: page-footer"></div>
</body>
</html>
